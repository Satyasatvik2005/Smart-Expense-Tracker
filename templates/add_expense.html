{% extends 'base.html' %}
{% block content %}

<div class="page-header">
    <div>
        <h2>{{ 'Edit Expense' if edit_mode else 'Add Expense' }}</h2>
        <p>{{ 'Update your expense details' if edit_mode else 'Add a new expense entry' }}</p>
    </div>
</div>

<section class="form-panel">
    <form method="POST" class="expense-form">
        <div class="form-group">
            <label>Amount (₹)</label>
            <input type="number" step="0.01" name="amount" required value="{{ expense['amount'] if expense else '' }}">
        </div>

        <div class="form-group">
            <label>Category</label>
            <select name="category" required>
                {% set current_category = expense['category'] if expense else '' %}
                <option value="">Select category</option>
                <option value="Food" {% if current_category == 'Food' %}selected{% endif %}>Food</option>
                <option value="Travel" {% if current_category == 'Travel' %}selected{% endif %}>Travel</option>
                <option value="Shopping" {% if current_category == 'Shopping' %}selected{% endif %}>Shopping</option>
                <option value="Bills" {% if current_category == 'Bills' %}selected{% endif %}>Bills</option>
                <option value="Entertainment" {% if current_category == 'Entertainment' %}selected{% endif %}>Entertainment</option>
                <option value="Health" {% if current_category == 'Health' %}selected{% endif %}>Health</option>
                <option value="Education" {% if current_category == 'Education' %}selected{% endif %}>Education</option>
                <option value="Other" {% if current_category == 'Other' %}selected{% endif %}>Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Date</label>
            <input type="date" name="date" required value="{{ expense['date'] if expense else '' }}">
        </div>

        <div class="form-group">
            <label>Note</label>
            <textarea name="note" rows="4" placeholder="Enter a short note">{{ expense['note'] if expense else '' }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">{{ 'Update Expense' if edit_mode else 'Add Expense' }}</button>
            <a href="{{ url_for('transactions') }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</section>

{% endblock %}
