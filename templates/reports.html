{% extends 'base.html' %}
{% block content %}

<div class="page-header">
    <div>
        <h2>Reports & Analytics</h2>
        <p>{{ month_name }}</p>
    </div>

    <form method="GET" action="{{ url_for('reports') }}" class="month-filter">
        <input type="month" name="month" value="{{ selected_month }}">
        <button type="submit" class="btn-primary">View</button>
    </form>
</div>

<div class="dashboard-grid">
    <section class="panel">
        <div class="panel-header">
            <h3>Category-Wise Spending</h3>
        </div>
        <canvas id="reportCategoryChart"></canvas>
    </section>

    <section class="panel">
        <div class="panel-header">
            <h3>Monthly Trend</h3>
        </div>
        <canvas id="trendChart"></canvas>
    </section>
</div>

<section class="panel insights-panel">
    <div class="panel-header">
        <h3>Smart Insights</h3>
    </div>

    <div class="insight-list">
        {% for insight in insights %}
            <div class="insight-card">{{ insight }}</div>
        {% endfor %}
    </div>
</section>

<script>
    const reportLabels = JSON.parse('{{ categories | tojson | safe }}');
    const reportValues = JSON.parse('{{ category_totals | tojson | safe }}');
    const trendMonths = JSON.parse('{{ trend_months | tojson | safe }}');
    const trendTotals = JSON.parse('{{ trend_totals | tojson | safe }}');

    const reportCategoryChartCanvas = document.getElementById('reportCategoryChart');
    const trendChartCanvas = document.getElementById('trendChart');

    if (reportCategoryChartCanvas && reportLabels.length > 0) {
        new Chart(reportCategoryChartCanvas, {
            type: 'pie',
            data: {
                labels: reportLabels,
                datasets: [{
                    data: reportValues,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: {
                            color: '#dbe7ff'
                        }
                    }
                }
            }
        });
    }

    if (trendChartCanvas && trendMonths.length > 0) {
        new Chart(trendChartCanvas, {
            type: 'bar',
            data: {
                labels: trendMonths,
                datasets: [{
                    label: 'Monthly Expense',
                    data: trendTotals,
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        ticks: {
                            color: '#dbe7ff'
                        },
                        grid: {
                            color: 'rgba(255,255,255,0.08)'
                        }
                    },
                    y: {
                        ticks: {
                            color: '#dbe7ff'
                        },
                        grid: {
                            color: 'rgba(255,255,255,0.08)'
                        }
                    }
                },
                plugins: {
                    legend: {
                        labels: {
                            color: '#dbe7ff'
                        }
                    }
                }
            }
        });
    }
</script>

{% endblock %}
